experiment:
  type: probing
  name: probing_all_concepts

model:
  name: Qwen3-VL-8B-Instruct
  path: /data1/yqpeng/models/Qwen3-VL-8B-Instruct
  device_map: auto
  dtype: bfloat16

dataset:
  root: /data1/yqpeng/spatial/dataset
  max_samples_per_attr: 0
  concepts:
    - name: natural
      csv_stem: natural
      group: non_affective
    - name: natural light
      csv_stem: natural light
      group: non_affective
    - name: rugged scene
      csv_stem: rugged scene
      group: non_affective
    - name: scary
      csv_stem: scary
      group: affective
    - name: soothing
      csv_stem: soothing
      group: affective
    - name: stressful
      csv_stem: stressful
      group: affective

probing:
  probe_type: logistic
  components:
    - encoder
    - decoder
  prompt: "Describe this image."
  test_size: 0.2
  dpi: 300

output:
  base_dir: ./output
  plot_format: png

runtime:
  seed: 42
