experiment:
  type: fisher_ratio
  name: fisher_ratio_encoder

model:
  name: Qwen3-VL-8B-Instruct
  path: /data1/yqpeng/models/Qwen3-VL-8B-Instruct
  device_map: auto
  dtype: bfloat16

dataset:
  root: /data1/yqpeng/spatial/dataset
  max_samples_per_attr: 20
  concepts:
    - name: natural
      csv_stem: natural
      group: non_affective
    - name: natural light
      csv_stem: natural light
      group: non_affective
    - name: rugged scene
      csv_stem: rugged scene
      group: non_affective
    - name: scary
      csv_stem: scary
      group: affective
    - name: soothing
      csv_stem: soothing
      group: affective
    - name: stressful
      csv_stem: stressful
      group: affective

fisher_ratio:
  components:
    - encoder
    - decoder
  prompt: "Describe this image."
  epsilon: 1e-10
  dpi: 300

output:
  base_dir: ./output
  plot_format: png

runtime:
  seed: 42
